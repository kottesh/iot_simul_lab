# Mosquitto MQTT Broker Configuration for TicTacToe
# Place this file at: /etc/mosquitto/conf.d/tictactoe.conf

# ===== Listeners =====

# Standard MQTT (for ESP32)
listener 1883
protocol mqtt
allow_anonymous true

# WebSocket MQTT (for Web & Flutter)
listener 9001
protocol websockets
allow_anonymous true

# ===== Connection Settings =====

# Maximum connections
max_connections -1

# Keep alive settings
max_keepalive 300

# Message size limits
message_size_limit 0

# Queue settings
max_queued_messages 1000
max_inflight_messages 20

# ===== Persistence =====

# Enable persistence for retained messages
persistence true
persistence_location /var/lib/mosquitto/

# Autosave interval (seconds)
autosave_interval 300

# ===== Logging (optional - for debugging) =====

# log_dest file /var/log/mosquitto/mosquitto.log
# log_type all
# log_timestamp true
# log_timestamp_format %Y-%m-%dT%H:%M:%S

# ===== Security (optional - for production) =====

# For production, consider:
# - Disabling allow_anonymous
# - Setting up password_file
# - Using TLS/SSL certificates

# Example:
# allow_anonymous false
# password_file /etc/mosquitto/passwd
# 
# listener 8883
# protocol mqtt
# cafile /etc/mosquitto/certs/ca.crt
# certfile /etc/mosquitto/certs/server.crt
# keyfile /etc/mosquitto/certs/server.key

# ===== WebSocket Settings =====

# WebSocket protocol name
websockets_log_level 0

# ===== Client Settings =====

# Allow clients to set their own client ID
# This is important for Flutter/Web clients
persistent_client_expiration 1h

# Connection timeout
timeout 60

# Retry interval
retry_interval 20
